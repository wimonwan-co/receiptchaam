<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบใบเสร็จ - บ้านพักหน้าหาดชะอำใต้</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@300;400;700&display=swap');
        :root { --primary: #333; --accent: #27ae60; --bg: #f4f6f8; --danger: #e74c3c; --line: #9ca3af; --soft-line: #d1d5db; }
        * { box-sizing: border-box; font-family: 'Mali', cursive; line-height: 1.4; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #333; }

        /* --- Editor Side --- */
        .editor-side { width: 450px; background: white; padding: 25px; overflow-y: auto; border-right: 1px solid #ddd; }
        h2 { font-size: 1.2rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }

        .room-item-row { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; position: relative; }
        .room-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        .btn-add-room { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .btn-remove { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; float: right; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 1rem; }
        .btn-pdf { background: #e74c3c; }
        .btn-sheet { background: #3498db; }

        /* --- Preview Side (Receipt) --- */
        .preview-side { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; background: #d1d5db; }
        #invoice-card { width: 210mm; min-height: 290mm; background: white; padding: 16mm 20mm; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* ปรับสัดส่วน Header ให้ฝั่งชื่อที่พักกว้างกว่า */
        .header { display: grid; grid-template-columns: 1.8fr 1fr; gap: 10px; align-items: flex-start; margin-bottom: 20px; }
        
        .shop-info { padding-top: 0; }
        .shop-info h1 { margin: 0 0 5px; font-size: 22px; line-height: 1.2; font-weight: 700; color: #1a1a1a; }
        .shop-info p { 
            margin: 5px 0 0 0; 
            font-size: 14.5px; 
            line-height: 1.45; 
            color: #333; 
        } 
        
        .title-block { text-align: right; line-height: 1.35; }
        .receipt-title { display: block; font-size: 26px; font-weight: 700; color: #2563eb; margin: 0; }
        .receipt-subtitle { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        
        .section-line { border: none; border-top: 1px solid #d7dce2; margin: 15px 0 24px; }
        
        .client-info { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: flex-start; margin-bottom: 30px; line-height: 1.7; font-size: 14px; }
        .client-left { min-width: 0; }
        .client-right { text-align: left; white-space: nowrap; justify-self: end; min-width: 220px; }

        table { width: 100%; border-collapse: collapse; margin-top: 0; font-size: 14px; }
        th, td { border: 0.8px solid #b8c0cc; padding: 12px 10px; text-align: center; }
        th { background: #f8fafc; font-weight: 700; color: #334155; }
        
        .total-row td { font-weight: bold; padding: 16px !important; background: #fcfcfc; font-size: 15px; }
        .no-border-right { border-right: none !important; }
        .no-border-left { border-left: none !important; }
        .text-left { text-align: left !important; }
        .text-right { text-align: right !important; }

        .sig-section { margin-top: 100px; display: flex; justify-content: flex-end; padding-right: 20px; }
        .sig-container { text-align: center; width: 250px; }
        .sig-line { border-top: 1.2px solid #555; width: 100%; margin-bottom: 12px; }
        .sig-text { font-size: 15px; color: #222; }

        @media print { 
            .editor-side { display: none; } 
            .preview-side { padding: 0; background: white; } 
            #invoice-card { box-shadow: none; width: 100%; } 
        }
    </style>
</head>
<body>
    <div class="editor-side">
        <h2>ออกใบเสร็จรับเงิน (Multi-Room)</h2>
        <div class="form-group">
            <label>เลขที่ใบเสร็จ</label>
            <input type="text" id="in_no">
        </div>
        <div class="form-group">
            <label>วันที่</label>
            <input type="date" id="in_date" onchange="updateReceiptNumber()">
        </div>
        <div class="form-group">
            <label>ชื่อลูกค้า</label>
            <input type="text" id="in_cust_name" placeholder="ระบุชื่อลูกค้า">
        </div>
        <div class="form-group">
            <label>ที่อยู่ลูกค้า</label>
            <textarea id="in_cust_addr" rows="2" placeholder="ระบุที่อยู่"></textarea>
        </div>
        <div class="form-group">
            <label>เลขผู้เสียภาษี</label>
            <input type="text" id="in_cust_tax" placeholder="ถ้ามี">
        </div>
        <hr>
        <label>รายการห้องพัก</label>
        <div id="room-list-editor"></div>
        <button class="btn-add-room" onclick="addRoomRow()">+ เพิ่มห้องพัก</button>
        <div class="action-btns">
            <button class="btn btn-sheet" onclick="saveToSheet()">Save to Sheet</button>
            <button class="btn btn-pdf" onclick="exportPDF()">Save PDF</button>
        </div>
    </div>

    <div class="preview-side">
        <div id="invoice-card">
            <div class="header">
                <div class="shop-info">
                    <h1>บ้านพักหน้าหาดชะอำใต้</h1>
                    <p>
                        ถนนร่วมจิตต์ ต.ชะอำ อ.ชะอำ จ.เพชรบุรี 76120<br>
                        โทร 081-731-5854
                    </p>
                </div>
                <div class="title-block">
                    <div class="receipt-title">ใบเสร็จรับเงิน</div>
                    <div class="receipt-subtitle">Receipt</div>
                </div>
            </div>

            <hr class="section-line">
            
            <div class="client-info">
                <div class="client-left">
                    <strong>ชื่อลูกค้า :</strong> <span id="out_cust_name">-</span>
                    <div style="margin-top: 10px;">
                        <strong>เลขประจำตัวผู้เสียภาษี :</strong> <span id="out_cust_tax">-</span>
                    </div>
                    <div style="margin-top: 10px;">
                        <strong>ที่อยู่ :</strong> <span id="out_cust_addr">-</span>
                    </div>
                </div>
                <div class="client-right">
                    <b>เลขที่ :</b> <span id="out_no"></span><br>
                    <b>วันที่ :</b> <span id="out_date"></span>
                </div>
            </div>

            <table>
                <thead>
                    <tr><th width="10%">ลำดับ</th><th width="40%">รายการห้องพัก</th><th width="10%">คืน</th><th width="20%">ราคา/คืน</th><th width="20%">รวมเงิน</th></tr>
                </thead>
                <tbody id="out_table_body"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" class="text-left no-border-right">(<span id="out_thai"></span>)</td>
                        <td colspan="3" class="text-right no-border-left">ยอดรวมสุทธิ: <span id="out_grand">0.00</span> บาท</td>
                    </tr>
                </tfoot>
            </table>
            
            <div class="sig-section">
                <div class="sig-container">
                    <div class="sig-line"></div>
                    <div class="sig-text">ผู้รับเงิน (Receiver)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJYN9aYRwI_uwMvw_H5bAuwpz4amSR5iANJQjBGDHkMTSKJsVApdh9ZVOlMC0RMYtN/exec"; 
        const roomOptions = ["บ้าน 5 เตียงหน้าทะเล", "บ้าน 8 เตียงหน้าทะเล", "บ้าน 8 เตียงบนเนิน", "บ้านชมพู", "บ้านส้ม", "บ้านลอฟท์ 1", "บ้านลอฟท์ 2", "บ้านลอฟท์ 3", 
        "บ้านลอฟท์ 4", "บ้านแฝด A", "บ้านแฝด B", "บ้านรุ้ง 1", "บ้านรุ้ง 2", "บ้านรุ้ง 3", "บ้านรุ้ง 4", "บ้านรุ้ง 5", "บ้านรุ้ง 6", "บ้านรุ้ง 7"];

        function updateReceiptNumber() {
            const dateInput = document.getElementById('in_date').value;
            if(!dateInput) return;
            const d = new Date(dateInput);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const currentNo = document.getElementById('in_no').value;
            const sequence = currentNo.includes('-') ? currentNo.split('-')[1] : "001";
            document.getElementById('in_no').value = `RECH${yyyy}${mm}${dd}-${sequence}`;
            updateInvoice();
        }

        function addRoomRow(data = {name: roomOptions[0], price: 0, qty: 1}) {
            const container = document.getElementById('room-list-editor');
            const rowId = Date.now();
            const div = document.createElement('div');
            div.className = 'room-item-row';
            div.id = `row-${rowId}`;
            div.innerHTML = `<button class="btn-remove" onclick="removeRoomRow('${rowId}')">ลบ</button><label>รายการที่ ${container.children.length + 1}</label>
                <select class="in-room-select" onchange="updateInvoice()">${roomOptions.map(opt => `<option value="${opt}" ${opt === data.name ? 'selected' : ''}>${opt}</option>`).join('')}</select>
                <div class="room-grid"><div><label>ราคา</label><input type="number" class="in-room-price" value="${data.price}" oninput="updateInvoice()"></div>
                <div><label>คืน</label><input type="number" class="in-room-qty" value="${data.qty}" oninput="updateInvoice()"></div></div>`;
            container.appendChild(div);
            updateInvoice();
        }

        function removeRoomRow(rowId) { document.getElementById(`row-${rowId}`).remove(); updateInvoice(); }

        function updateInvoice() {
            document.getElementById('out_no').innerText = document.getElementById('in_no').value;
            const d = new Date(document.getElementById('in_date').value);
            document.getElementById('out_date').innerText = isNaN(d) ? "" : d.toLocaleDateString('th-TH', {day:'numeric', month:'long', year:'numeric'});
            
            const fields = { 'in_cust_name': 'out_cust_name', 'in_cust_addr': 'out_cust_addr', 'in_cust_tax': 'out_cust_tax' };
            for(let key in fields) {
                const val = document.getElementById(key).value.trim();
                document.getElementById(fields[key]).innerHTML = val ? val : "<span class='muted-dash'>-</span>";
            }

            const rows = document.querySelectorAll('.room-item-row');
            const tbody = document.getElementById('out_table_body');
            tbody.innerHTML = ''; let grandTotal = 0;
            rows.forEach((row, index) => {
                const name = row.querySelector('.in-room-select').value;
                const price = parseFloat(row.querySelector('.in-room-price').value) || 0;
                const qty = parseFloat(row.querySelector('.in-room-qty').value) || 0;
                const total = price * qty; grandTotal += total;
                tbody.innerHTML += `<tr><td>${index + 1}</td><td class="text-left">${name}</td><td>${qty}</td><td class="text-right">${price.toLocaleString(undefined, {minimumFractionDigits:2})}</td><td class="text-right">${total.toLocaleString(undefined, {minimumFractionDigits:2})}</td></tr>`;
            });
            document.getElementById('out_grand').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('out_thai').innerText = ArabicNumberToThaiText(grandTotal.toFixed(2));
        }

        async function saveToSheet() {
            const rows = document.querySelectorAll('.room-item-row');
            if(rows.length === 0) return alert("กรุณาเพิ่มรายการห้องพัก");
            let taxIdValue = document.getElementById('in_cust_tax').value;
            if (taxIdValue) taxIdValue = "'" + taxIdValue;

            const data = {
                receiptNo: document.getElementById('in_no').value,
                date: document.getElementById('in_date').value,
                customerName: document.getElementById('in_cust_name').value,
                customerAddress: document.getElementById('in_cust_addr').value,
                taxId: taxIdValue,
                roomName: Array.from(rows).map(r => r.querySelector('.in-room-select').value).join(', '),
                totalAmount: parseFloat(document.getElementById('out_grand').innerText.replace(/,/g, ''))
            };

            const btn = document.querySelector('.btn-sheet'); 
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("บันทึกสำเร็จ!");
            } catch (error) { alert("ผิดพลาด"); } finally { btn.innerText = "Save to Sheet"; btn.disabled = false; }
        }

        function exportPDF() {
            const element = document.getElementById('invoice-card');
            html2pdf().set({ 
                filename: `Receipt_${document.getElementById('in_no').value}.pdf`, 
                html2canvas: { scale: 2 }, 
                jsPDF: { format: 'a4', orientation: 'portrait' } 
            }).from(element).save();
        }

        function ArabicNumberToThaiText(Number) {
            const thaiNumber = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
            const thaiUnit = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
            if (isNaN(Number) || Number == 0) return "ศูนย์บาทถ้วน";
            let [integer, fraction] = Number.split(".");
            let outputText = "";
            for (let i = 0; i < integer.length; i++) {
                let n = integer.substr(i, 1);
                if (n != "0") {
                    if (i == integer.length - 1 && n == "1" && integer.length > 1) outputText += "เอ็ด";
                    else if (i == integer.length - 2 && n == "2") outputText += "ยี่";
                    else if (i == integer.length - 2 && n == "1") outputText += "";
                    else outputText += thaiNumber[n];
                    outputText += thaiUnit[integer.length - i - 1];
                }
            }
            outputText += "บาท" + ((!fraction || fraction == "00") ? "ถ้วน" : "สตางค์");
            return outputText;
        }

        document.getElementById('in_date').valueAsDate = new Date();
        ['in_no', 'in_cust_name', 'in_cust_addr', 'in_cust_tax'].forEach(id => 
            document.getElementById(id).addEventListener('input', updateInvoice)
        );
        addRoomRow();
        updateReceiptNumber();
    </script>
</body>
</html>
